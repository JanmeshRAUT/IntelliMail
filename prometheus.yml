global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: 'intellmail_app'
    metrics_path: /metrics
    scrape_interval: 15s
    scrape_timeout: 10s
    static_configs:
      - targets: ['intellmail:5000']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: intellmail
