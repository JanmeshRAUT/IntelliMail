apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://intellmail-prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: 15s
      queryTimeout: 10s
  
  - name: Prometheus-Local
    type: prometheus
    access: proxy
    url: http://localhost:9090
    isDefault: false
    editable: true
