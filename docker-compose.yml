services:
  app:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - ML_SERVICE_URL=http://api:5000
      - LSTM_SERVICE_URL=http://api:5000
      - APP_URL=${APP_URL}
    depends_on:
      api:
        condition: service_healthy
    restart: always

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    ports:
      - "5000:5000"
      - "5001:5001"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s
