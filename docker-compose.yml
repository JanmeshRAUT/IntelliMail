version: "3.9"
services:
  app:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - ML_SERVICE_URL=http://api:5000
      - LSTM_SERVICE_URL=http://api:5000
      - APP_URL=${APP_URL}
    depends_on:
      - api
    restart: always

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    ports:
      - "5000:5000"
      - "5001:5001"
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.connect(('localhost', 5000)); s.close()"]
      interval: 30s
      timeout: 3s
      retries: 3
