version: '3.8'
services:
  mongodb:
    image: mongo:7.0
    container_name: intellimail-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-password}
      MONGO_INITDB_DATABASE: intellimail
    volumes:
      - mongodb_data:/data/db
    restart: always
    networks:
      - intellimail-network

  app:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: intellimail-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - APP_URL=${APP_URL}
      - MONGODB_URI=mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-password}@mongodb:27017/intellimail?authSource=admin
      - MONGO_USER=${MONGO_USER:-admin}
      - MONGO_PASSWORD=${MONGO_PASSWORD:-password}
    depends_on:
      - mongodb
    restart: always
    networks:
      - intellimail-network

volumes:
  mongodb_data:

networks:
  intellimail-network:
    driver: bridge
