services:
  app:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - ML_SERVICE_URL=http://api:5000
      - LSTM_SERVICE_URL=http://api:5001
      - APP_URL=${APP_URL}
    depends_on:
      - api
    restart: always

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    ports:
      - "5000:5000"
      - "5001:5001"
    restart: always

  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    restart: always

  grafana:
    image: grafana/grafana
    ports:
      - "4001:3000"
    restart: always
