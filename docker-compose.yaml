version: '3.8'

services:
  # IntelliMail Unified Service (Frontend + Proxy Server)
  # Connects to Hugging Face via environment variables
  intellmail:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: intellmail-app
    ports:
      - "5000:5000" # Main App & API
    env_file:
      - .env
    restart: always

networks:
  default:
    name: intellmail-network
