services:
  intellmail:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID}
        - VITE_ML_SERVICE_URL=${VITE_ML_SERVICE_URL}
        - VITE_LSTM_SERVICE_URL=${VITE_LSTM_SERVICE_URL}
    container_name: intellmail-app
    hostname: intellmail
    ports:
      - "5000:5000"
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - intellmail-network
    environment:
      - NODE_ENV=production
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  # Prometheus - Metrics Collection & Storage
  prometheus:
    image: prom/prometheus:latest
    container_name: intellmail-prometheus
    hostname: prometheus
    ports:
      - "9090:9090"
    pull_policy: never
    user: root
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
      - '--web.external-url=http://localhost:9090/'
      - '--storage.tsdb.retention.time=30d'
    depends_on:
      - intellmail
    restart: unless-stopped
    networks:
      - intellmail-network
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # Grafana - Visualization & Dashboarding
  grafana:
    image: grafana/grafana:latest
    container_name: intellmail-grafana
    hostname: grafana
    ports:
      - "3000:3000"
    pull_policy: never
    user: root
    depends_on:
      - prometheus
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
    environment:
      # Admin Settings
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_DISABLE_BRANCH_PROTECTION=true
      
      # Database Settings
      - GF_DATABASE_TYPE=sqlite3
      - GF_DATABASE_PATH=/var/lib/grafana/grafana.db
      
      # Security & Auth
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_AUTH_ANONYMOUS_ORG_ROLE=
      - GF_AUTH_DISABLE_LOGIN_FORM=false
      - GF_USERS_ALLOW_SIGN_UP=false
      
      # Provisioning
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
      
      # Server Settings
      - GF_SERVER_ROOT_URL=http://localhost:3000/
      - GF_SERVER_SERVE_FROM_SUB_PATH=false
      
      # Install Plugins
      - GF_INSTALL_PLUGINS=
      
      # Logging
      - GF_LOG_LEVEL=info
      - GF_LOG_MODE=console
    restart: unless-stopped
    networks:
      - intellmail-network
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

networks:
  intellmail-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
