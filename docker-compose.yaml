version: '3.8'

services:
  # IntelliMail Unified Service (Frontend + Proxy Server)
  # Connects to Hugging Face via environment variables
  intellmail:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: intellmail-app
    ports:
      - "5000:5000" # Main App & API
    env_file:
      - .env
    restart: always

  prometheus:
    image: prom/prometheus:latest
    container_name: intellmail-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    depends_on:
      - intellmail
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: intellmail-grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
    restart: unless-stopped

networks:
  default:
    name: intellmail-network

volumes:
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
